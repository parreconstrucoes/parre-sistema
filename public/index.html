<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/favicon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Parre">
<meta name="theme-color" content="#0a0a0a">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parre Construtora — Sistema de Gestão</title>
<style>
:root {
  --ouro: #C9A84C;
  --ouro-dark: #A8893A;
  --ouro-bg: #C9A84C18;
  --preto: #0a0a0a;
  --preto2: #111111;
  --preto3: #1a1a1a;
  --cinza: #222222;
  --cinza2: #333333;
  --texto: #cccccc;
  --texto2: #888888;
  --texto3: #555555;
  --verde: #4CAF50;
  --verde-bg: #1a3a1a;
  --vermelho: #E24B4A;
  --vermelho-bg: #2a1a1a;
  --azul: #4A9EE0;
  --azul-bg: #1a2a3a;
  --roxo: #A084DC;
  --roxo-bg: #2a1a3a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--preto); color: var(--texto); min-height: 100vh; }
input, select, textarea { font-family: inherit; }
button { cursor: pointer; font-family: inherit; }

/* LOGIN */
#login-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--preto); }
.login-box { display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; max-width: 340px; padding: 24px; }
.login-logo { width: 100px; height: 100px; object-fit: contain; }
.login-marca { text-align: center; }
.login-marca h1 { font-size: 22px; font-weight: 600; color: var(--ouro); letter-spacing: 2px; }
.login-marca p { font-size: 11px; color: var(--texto3); letter-spacing: 3px; margin-top: 2px; }
.login-card { background: var(--preto3); border: 0.5px solid #C9A84C33; border-radius: 12px; padding: 24px; width: 100%; }
.login-card h2 { font-size: 13px; color: var(--ouro); text-align: center; margin-bottom: 18px; font-weight: 500; }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 11px; color: var(--texto3); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.4px; }
.field input, .field select, .field textarea {
  width: 100%; background: var(--preto2); border: 0.5px solid var(--cinza2);
  border-radius: 7px; padding: 9px 12px; font-size: 13px; color: var(--texto);
  transition: border-color 0.15s;
}
.field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--ouro); }
.field select option { background: var(--preto3); }
.btn-primary { background: var(--ouro); color: var(--preto); border: none; border-radius: 7px; padding: 10px 20px; font-size: 13px; font-weight: 600; width: 100%; transition: background 0.15s; }
.btn-primary:hover { background: var(--ouro-dark); }
.btn-secondary { background: transparent; color: var(--ouro); border: 0.5px solid var(--ouro); border-radius: 7px; padding: 7px 14px; font-size: 12px; font-weight: 500; transition: all 0.15s; }
.btn-secondary:hover { background: var(--ouro-bg); }
.btn-danger { background: transparent; color: var(--vermelho); border: 0.5px solid var(--vermelho); border-radius: 7px; padding: 5px 10px; font-size: 11px; }
.btn-danger:hover { background: var(--vermelho-bg); }
.login-erro { color: var(--vermelho); font-size: 12px; text-align: center; margin-top: 8px; }

/* APP LAYOUT */
#app { display: none; flex-direction: row; min-height: 100vh; }
.sidebar { width: 64px; background: var(--preto); border-right: 0.5px solid #C9A84C22; display: flex; flex-direction: column; align-items: center; padding: 12px 0; gap: 4px; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; }
.sidebar-logo { width: 44px; height: 44px; object-fit: contain; margin-bottom: 12px; }
.nav-btn { width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--texto3); background: transparent; border: none; transition: all 0.15s; position: relative; cursor: pointer; }
.nav-btn:hover { background: var(--ouro-bg); color: var(--ouro); }
.nav-btn.active { background: var(--ouro-bg); color: var(--ouro); }
.nav-btn::after { content: attr(data-tip); position: absolute; left: 52px; background: var(--preto3); color: var(--texto); font-size: 11px; padding: 4px 8px; border-radius: 5px; white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity 0.15s; border: 0.5px solid var(--cinza2); }
.nav-btn:hover::after { opacity: 1; }
.sidebar-bottom { margin-top: auto; }
.logout-btn { width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--texto3); background: transparent; border: none; cursor: pointer; }
.logout-btn:hover { color: var(--vermelho); }
.main { margin-left: 64px; flex: 1; display: flex; flex-direction: column; }
.topbar { background: var(--preto); border-bottom: 0.5px solid #C9A84C22; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
.topbar h1 { font-size: 16px; font-weight: 500; color: var(--ouro); }
.topbar p { font-size: 11px; color: var(--texto3); margin-top: 1px; }
.content { padding: 20px; flex: 1; }

/* CARDS */
.cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; margin-bottom: 18px; }
.card-metric { background: var(--preto3); border: 0.5px solid var(--cinza); border-radius: 9px; padding: 12px 14px; border-left: 2px solid var(--ouro); }
.card-metric.verde { border-left-color: var(--verde); }
.card-metric.vermelho { border-left-color: var(--vermelho); }
.card-metric.azul { border-left-color: var(--azul); }
.card-metric.roxo { border-left-color: var(--roxo); }
.card-metric label { font-size: 9px; color: var(--texto3); text-transform: uppercase; letter-spacing: 0.4px; display: block; margin-bottom: 4px; }
.card-metric .val { font-size: 18px; font-weight: 600; color: var(--ouro); }
.card-metric.verde .val { color: var(--verde); }
.card-metric.vermelho .val { color: var(--vermelho); }
.card-metric.azul .val { color: var(--azul); }
.card-metric.roxo .val { color: var(--roxo); }
.card-metric .sub { font-size: 10px; color: var(--texto3); margin-top: 2px; }

/* SEÇÃO */
.secao { background: var(--preto3); border: 0.5px solid var(--cinza); border-radius: 10px; margin-bottom: 16px; overflow: hidden; }
.secao-header { padding: 12px 16px; border-bottom: 0.5px solid var(--cinza); display: flex; align-items: center; justify-content: space-between; }
.secao-header h2 { font-size: 13px; font-weight: 500; color: var(--ouro); }
.secao-body { padding: 16px; }

/* TABELA */
.tabela-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { background: var(--preto2); padding: 8px 12px; text-align: left; font-size: 10px; font-weight: 500; color: var(--texto3); text-transform: uppercase; letter-spacing: 0.3px; border-bottom: 0.5px solid var(--cinza); }
td { padding: 9px 12px; border-bottom: 0.5px solid var(--cinza); color: var(--texto2); }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(201,168,76,0.04); }
.td-num { text-align: right; font-variant-numeric: tabular-nums; }
.td-ouro { color: var(--ouro); font-weight: 500; }
.td-verde { color: var(--verde); }
.td-vermelho { color: var(--vermelho); }
.total-row td { font-weight: 600; background: rgba(201,168,76,0.08); border-top: 0.5px solid var(--ouro); color: var(--texto); }

/* BADGES */
.badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 10px; font-weight: 500; }
.badge-verde { background: var(--verde-bg); color: var(--verde); }
.badge-amarelo { background: #3a2a00; color: var(--ouro); }
.badge-azul { background: var(--azul-bg); color: var(--azul); }
.badge-roxo { background: var(--roxo-bg); color: var(--roxo); }
.badge-vermelho { background: var(--vermelho-bg); color: var(--vermelho); }

/* BARRA PROGRESSO */
.prog-wrap { margin: 6px 0; }
.prog-info { display: flex; justify-content: space-between; font-size: 10px; color: var(--texto3); margin-bottom: 4px; }
.prog-track { height: 6px; background: var(--cinza); border-radius: 99px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 99px; background: var(--ouro); transition: width 0.3s; }
.prog-fill.verde { background: var(--verde); }
.prog-fill.vermelho { background: var(--vermelho); }

/* MODAL */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.open { display: flex; }
.modal { background: var(--preto3); border: 0.5px solid #C9A84C44; border-radius: 12px; padding: 20px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
.modal h2 { font-size: 15px; font-weight: 500; color: var(--ouro); margin-bottom: 16px; }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

/* TOAST */
.toast { position: fixed; bottom: 20px; right: 20px; background: var(--preto3); border: 0.5px solid var(--ouro); color: var(--ouro); padding: 10px 16px; border-radius: 8px; font-size: 12px; z-index: 999; display: none; }
.toast.show { display: block; animation: fadeIn 0.2s; }
.toast.erro { border-color: var(--vermelho); color: var(--vermelho); }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* SUBNAV */
.subnav { display: flex; gap: 2px; border-bottom: 0.5px solid var(--cinza); margin-bottom: 16px; }
.subnav-btn { padding: 8px 14px; font-size: 12px; color: var(--texto3); background: transparent; border: none; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
.subnav-btn:hover { color: var(--ouro); }
.subnav-btn { color: var(--texto3); border-bottom: 2px solid transparent; }
.subnav-btn.active { color: var(--ouro) !important; border-bottom-color: var(--ouro) !important; }

/* FLUXO STATUS */
.fluxo { display: flex; align-items: center; gap: 0; margin-bottom: 14px; }
.fluxo-step { flex: 1; text-align: center; padding: 8px 4px; background: var(--preto2); border: 0.5px solid var(--cinza2); font-size: 11px; color: var(--texto3); }
.fluxo-step:first-child { border-radius: 6px 0 0 6px; }
.fluxo-step:last-child { border-radius: 0 6px 6px 0; }
.fluxo-step.ativo { background: var(--ouro-bg); border-color: var(--ouro); color: var(--ouro); }
.fluxo-step.concluido { background: var(--verde-bg); border-color: var(--verde); color: var(--verde); }
.fluxo-seta { color: var(--cinza2); font-size: 12px; }

/* CATS DESPESA */
.cats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 14px; }
.cat-item { background: var(--preto2); border: 0.5px solid var(--cinza2); border-radius: 8px; padding: 10px 8px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; transition: all 0.15s; }
.cat-item:hover, .cat-item.active { background: var(--ouro-bg); border-color: var(--ouro); }
.cat-item i { font-size: 20px; color: var(--texto3); }
.cat-item:hover i, .cat-item.active i { color: var(--ouro); }
.cat-item span { font-size: 10px; color: var(--texto3); }
.cat-item:hover span, .cat-item.active span { color: var(--ouro); }

/* MOBILE */
@media (max-width: 600px) {
  .sidebar { width: 100%; height: 56px; flex-direction: row; top: auto; bottom: 0; left: 0; padding: 0 8px; border-right: none; border-top: 0.5px solid #C9A84C22; justify-content: space-around; }
  .sidebar-logo { display: none; }
  .nav-btn::after { display: none; }
  .main { margin-left: 0; margin-bottom: 56px; }
  .cards-grid { grid-template-columns: 1fr 1fr; }
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
  .cats-grid { grid-template-columns: repeat(2,1fr); }
}

.view { display: none; }
.view.ativa { display: block; }
.subview { display: none; }
.subview.ativa { display: block; }
.loading { text-align: center; padding: 40px; color: var(--texto3); }
.spinner { display: inline-block; width: 24px; height: 24px; border: 2px solid var(--cinza2); border-top-color: var(--ouro); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty { text-align: center; padding: 30px; color: var(--texto3); font-size: 13px; }
</style>
</head>

<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)fecharModal()">
  <div class="modal" id="modal-content"></div>
</div>

<div class="toast" id="toast"></div>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css">

<script>
let TOKEN = localStorage.getItem('parre_token') || '';
let OBRA_ATUAL = null;
let CAT_DESPESA = 'Gasolina';

const API = (path, opts={}) => {
  opts.headers = { ...(opts.headers||{}), 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' };
  if (opts.body && typeof opts.body === 'object') opts.body = JSON.stringify(opts.body);
  return fetch('/api' + path, opts).then(r => r.json());
};

const brl = v => isNaN(+v) ? 'R$ 0,00' : (+v).toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
const pct = v => (+v*100).toFixed(1) + '%';
const toast = (msg, erro=false) => {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (erro?' erro':'');
  setTimeout(() => el.className = 'toast', 3000);
};

// AUTH
async function fazerLogin() {
  const usuario = document.getElementById('login-usuario').value;
  const senha = document.getElementById('login-senha').value;
  const r = await fetch('/api/login', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({usuario, senha})
  }).then(r => r.json());
  if (r.token) {
    TOKEN = r.token;
    localStorage.setItem('parre_token', TOKEN);
    document.getElementById('login-page').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    carregarDashboard();
  } else {
    document.getElementById('login-erro').textContent = r.error || 'Erro ao fazer login';
  }
}

function sair() {
  localStorage.removeItem('parre_token');
  TOKEN = '';
  document.getElementById('login-page').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

function abrirModal(html) {
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('open');
}
function fecharModal() { document.getElementById('modal-overlay').classList.remove('open'); }

function navegarPara(view, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('ativa'));
  document.getElementById('view-' + view)?.classList.add('ativa');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn?.classList.add('active');
  const titulos = {
    dashboard: ['Visão Geral','Resumo consolidado'],
    obras: ['Obras','Gerenciamento de obras'],
    'obra-detalhe': ['','Detalhes da obra'],
    prestacao: ['Prestação de Serviços','Orçamentos e despesas operacionais'],
    folha: ['Folha de Pagamento','Pró-labore e DARF'],
    relatorios: ['Relatórios','Análise financeira'],
  };
  const t = titulos[view] || [view,''];
  document.getElementById('topbar-titulo').textContent = t[0];
  document.getElementById('topbar-sub').textContent = t[1];
  const actions = {
    obras: `<button class="btn-secondary" onclick="modalNovaObra()">+ Nova obra</button>`,
    prestacao: '',
    folha: '',
  };
  document.getElementById('topbar-action').innerHTML = actions[view] || '';
  if (view === 'dashboard') carregarDashboard();
  if (view === 'obras') carregarObras();
  if (view === 'prestacao') carregarPrestacao();
  if (view === 'folha') carregarFolha();
  if (view === 'relatorios') carregarRelatorios();
}

function subnavegar(view, btn, sub) {
  const container = document.getElementById('view-' + view + '-detalhe') || document.getElementById('view-' + view);
  if (container) {
    container.querySelectorAll('.subnav-btn').forEach(b => b.classList.remove('active'));
    container.querySelectorAll('.subview').forEach(s => s.classList.remove('ativa'));
  }
  if (btn) btn.classList.add('active');
  const subEl = document.getElementById('subview-' + view + '-' + sub);
  if (subEl) subEl.classList.add('ativa');
  if (view === 'obra' && OBRA_ATUAL) carregarSubviewObra(sub, OBRA_ATUAL);
  if (view === 'prestacao') carregarSubviewPrestacao(sub);
  if (view === 'folha') carregarSubviewFolha(sub);
}

// DASHBOARD
async function carregarDashboard() {
  const obras = await API('/obras');
  const totalObras = obras.reduce((s,o) => s + (o.total_gasto||0), 0);
  const budgetRestante = obras.reduce((s,o) => s + (o.budget_restante||0), 0);
  const fat = await API('/orcamentos').then(r => r.filter(o=>o.status==='Recebido').reduce((s,o)=>s+(o.valor||0),0)).catch(()=>0);
  const prolabore = await API('/folha_pagamento').then(r => r.reduce((s,o)=>s+(o.pro_labore||0),0)).catch(()=>0);

  document.getElementById('dash-cards').innerHTML = `
    <div class="card-metric"><label>Custo total obras</label><div class="val">${brl(totalObras)}</div><div class="sub">${obras.length} obra(s)</div></div>
    <div class="card-metric verde"><label>Budget restante</label><div class="val">${brl(budgetRestante)}</div></div>
    <div class="card-metric azul"><label>Faturamento serviços</label><div class="val">${brl(fat)}</div><div class="sub">Recebido</div></div>
    <div class="card-metric vermelho"><label>Pró-labore total</label><div class="val">${brl(prolabore)}</div><div class="sub">Gustavo + Vinicius</div></div>
  `;

  document.getElementById('dash-obras').innerHTML = obras.map(o => {
    const pct_budget = o.budget > 0 ? Math.min(o.total_gasto/o.budget*100,100) : 0;
    const cor = pct_budget > 90 ? 'vermelho' : pct_budget > 70 ? '' : 'verde';
    return `<div style="padding:12px 14px;border-bottom:0.5px solid var(--cinza);cursor:pointer" onclick="abrirObra(${o.id})">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="font-size:13px;color:var(--ouro);font-weight:500">${o.nome}</span>
        <span class="badge badge-amarelo">${o.status}</span>
      </div>
      <div class="prog-wrap">
        <div class="prog-info"><span>${brl(o.total_gasto)}</span><span>${brl(o.budget)}</span></div>
        <div class="prog-track"><div class="prog-fill ${cor}" style="width:${pct_budget.toFixed(1)}%"></div></div>
      </div>
    </div>`;
  }).join('') || '<div class="empty">Nenhuma obra cadastrada</div>';

  document.getElementById('dash-lancamentos').innerHTML = '<div class="empty" style="color:var(--texto3)">Acesse uma obra para ver lançamentos</div>';
}

// OBRAS

      <button class="btn-secondary" onclick="modalNovaObra()">+ Nova obra</button>
    </div>
    ${obras.map(o => {
      const pct_budget = o.budget > 0 ? Math.min(o.total_gasto/o.budget*100,100) : 0;

      return `<div class="secao" style="margin-bottom:12px">
        <div class="secao-header">
          <div>
            <h2 style="cursor:pointer" onclick="abrirObra(${o.id})">${o.nome}</h2>
            <p style="font-size:10px;color:var(--texto3);margin-top:2px">${[o.condominio,o.rua,o.quadra?'Quadra '+o.quadra:'',o.lote?'Lote '+o.lote:''].filter(Boolean).join(' — ')}</p>

        </div>
        <div class="secao-body">
          <div class="cards-grid">
            <div class="card-metric"><label>Budget</label><div class="val" style="font-size:15px">${brl(o.budget)}</div></div>
            <div class="card-metric vermelho"><label>Total gasto</label><div class="val" style="font-size:15px">${brl(o.total_gasto)}</div></div>
            <div class="card-metric verde"><label>Restante</label><div class="val" style="font-size:15px">${brl(o.budget_restante)}</div></div>

async function abrirObra(id) {
  const obras = await API('/obras');
  OBRA_ATUAL = obras.find(o => o.id === id);
  if (!OBRA_ATUAL) return;
  document.getElementById('topbar-titulo').textContent = OBRA_ATUAL.nome;
  document.getElementById('topbar-sub').textContent = OBRA_ATUAL.condominio || '';
  document.getElementById('topbar-action').innerHTML = `
    <button class="btn-secondary" onclick="navegarPara('obras',null)">← Obras</button>
  `;
  document.querySelectorAll('.view').forEach(v => v.classList.remove('ativa'));
  document.getElementById('view-obra-detalhe').classList.add('ativa');
  document.querySelectorAll('#view-obra-detalhe .subview').forEach(s => s.classList.remove('ativa'));
  document.getElementById('subview-obra-resumo').classList.add('ativa');
  document.querySelectorAll('#view-obra-detalhe .subnav-btn').forEach((b,i) => b.classList.toggle('active', i===0));
  carregarSubviewObra('resumo', OBRA_ATUAL);
}

function recalcResumo(pct, fat, desp, prolabore) {
  const imp = fat * (+pct/100);
  document.getElementById('imp-valor').textContent = brl(imp);
  const liq = fat - imp - desp - prolabore;
  document.getElementById('resultado-liq').textContent = brl(liq);
  document.getElementById('resultado-liq').className = liq >= 0 ? 'td-verde' : 'td-vermelho';
}

async function carregarRelatorios() {
  const obras = await API('/obras');
  const orc = await API('/orcamentos');
  const desp = await API('/despesas_prestacao');
  const folha = await API('/folha_pagamento');
  const totalObras = obras.reduce((s,o)=>s+(o.total_gasto||0),0);
  const totalFat = orc.filter(r=>r.status==='Recebido').reduce((s,r)=>s+(r.valor||0),0);
  const totalDesp = desp.reduce((s,r)=>s+(r.valor||0),0);
  const totalFolha = folha.reduce((s,r)=>s+(r.pro_labore||0),0);
  document.getElementById('relatorios-content').innerHTML = `
    <div class="cards-grid">
      <div class="card-metric vermelho"><label>Total investido obras</label><div class="val">${brl(totalObras)}</div></div>
      <div class="card-metric verde"><label>Faturamento serviços</label><div class="val">${brl(totalFat)}</div></div>
      <div class="card-metric"><label>Despesas operacionais</label><div class="val">${brl(totalDesp)}</div></div>
      <div class="card-metric roxo"><label>Pró-labore total</label><div class="val">${brl(totalFolha)}</div></div>
    </div>
    ${obras.map(o=>{
      const pct = o.budget>0?Math.min(o.total_gasto/o.budget*100,100):0;
      const lucro = (o.valor_venda||0)-(o.total_gasto||0)-(o.valor_corretor||0)-(o.imposto_venda||0);
      return `<div class="secao" style="margin-bottom:12px">
        <div class="secao-header"><h2>${o.nome}</h2></div>
        <div class="secao-body">
          <div class="cards-grid">
            <div class="card-metric"><label>Custo total</label><div class="val" style="font-size:15px">${brl(o.total_gasto)}</div></div>
            <div class="card-metric"><label>Valor venda</label><div class="val" style="font-size:15px">${brl(o.valor_venda)}</div></div>
            <div class="card-metric ${lucro>=0?'verde':'vermelho'}"><label>Resultado estimado</label><div class="val" style="font-size:15px">${brl(lucro)}</div></div>
            <div class="card-metric verde"><label>Budget restante</label><div class="val" style="font-size:15px">${brl(o.budget_restante)}</div></div>
          </div>
          <div class="prog-wrap">
            <div class="prog-info"><span>Budget: ${pct.toFixed(1)}%</span><span>${brl(o.total_gasto)} / ${brl(o.budget)}</span></div>
            <div class="prog-track"><div class="prog-fill ${pct>90?'vermelho':''}" style="width:${pct.toFixed(1)}%"></div></div>
          </div>
        </div>
      </div>`;
    }).join('')}
  `;
}

// EXCLUIR
async function excluirItem(tabela, id, callback) {
  if (!confirm('Confirma a exclusão?')) return;
  await API('/' + tabela + '/' + id, {method:'DELETE'});
  toast('Item excluído');
  callback?.();
}
async function excluirObra(id, nome) {
  if (!confirm(`Excluir a obra "${nome}"? Todos os lançamentos serão removidos.`)) return;
  await API('/obras/' + id, {method:'DELETE'});
  toast('Obra excluída');
  carregarObras();
}

  };
  await API('/darfs', {method:'POST', body: data});
  fecharModal(); toast('DARF salvo!'); carregarSubviewFolha('darf');
}
